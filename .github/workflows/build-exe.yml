name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag for release, for example v1.0.0'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build EXE
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name DPIConnectivityTester tester_gui_5.3.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DPIConnectivityTester-windows
          path: dist/DPIConnectivityTester.exe
          if-no-files-found: error

      - name: Create Release and upload EXE
        if: ${{ github.event.inputs.release_tag != '' }}
        run: |
          gh release create "${{ github.event.inputs.release_tag }}" "dist/DPIConnectivityTester.exe" --title "${{ github.event.inputs.release_tag }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
